name: PR Quality Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  pr-info:
    name: PR Information
    runs-on: ubuntu-latest

    steps:
      - name: PR details
        run: |
          echo "PR #${{ github.event.pull_request.number }}"
          echo "Title: ${{ github.event.pull_request.title }}"
          echo "Author: ${{ github.event.pull_request.user.login }}"
          echo "Base: ${{ github.event.pull_request.base.ref }}"
          echo "Head: ${{ github.event.pull_request.head.ref }}"

  validate-pr:
    name: Validate PR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR title
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"
          if [[ ! "$PR_TITLE" =~ ^(feat|fix|docs|style|refactor|test|chore|perf)(\(.+\))?:.+ ]]; then
            echo "❌ PR title does not follow conventional commits format"
            echo "Expected format: type(scope): description"
            echo "Types: feat, fix, docs, style, refactor, test, chore, perf"
            exit 1
          fi
          echo "✅ PR title follows conventional commits"

      - name: Check for large files
        run: |
          LARGE_FILES=$(find . -type f -size +5M -not -path "./.git/*" -not -path "./build/*" -not -path "./node_modules/*")
          if [ -n "$LARGE_FILES" ]; then
            echo "❌ Large files detected (>5MB):"
            echo "$LARGE_FILES"
            exit 1
          fi
          echo "✅ No large files found"

      - name: Check commit messages
        run: |
          git log origin/${{ github.event.pull_request.base.ref }}..${{ github.event.pull_request.head.sha }} --pretty=format:"%s" | while read message; do
            if [[ ! "$message" =~ ^(feat|fix|docs|style|refactor|test|chore|perf)(\(.+\))?:.+ ]]; then
              echo "❌ Commit message does not follow conventional commits: $message"
              exit 1
            fi
          done
          echo "✅ All commit messages follow conventional commits"

  build-check:
    name: Build Check
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: tasktracker_db_test
          MYSQL_USER: testuser
          MYSQL_PASSWORD: testpass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Check compilation
        run: ./gradlew compileKotlin compileTestKotlin

      - name: Run tests
        env:
          DB_URL: jdbc:mysql://localhost:3306/tasktracker_db_test?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
          DB_USERNAME: testuser
          DB_PASSWORD: testpass
        run: ./gradlew test

      - name: Build check
        run: ./gradlew build -x test

  code-review:
    name: Automated Code Review
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run linter
        run: ./gradlew check || true

      - name: Check for TODO comments
        run: |
          TODOS=$(grep -r "TODO\|FIXME\|XXX" src/ || true)
          if [ -n "$TODOS" ]; then
            echo "⚠️  TODO/FIXME comments found:"
            echo "$TODOS"
          else
            echo "✅ No TODO/FIXME comments found"
          fi

      - name: Check for debug statements
        run: |
          DEBUG_STATEMENTS=$(grep -r "println\|System.out" src/main/ || true)
          if [ -n "$DEBUG_STATEMENTS" ]; then
            echo "⚠️  Debug statements found:"
            echo "$DEBUG_STATEMENTS"
            echo "Consider using a proper logging framework"
          else
            echo "✅ No debug statements found in main code"
          fi

  changes-summary:
    name: Changes Summary
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changes summary
        run: |
          echo "## Changes Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### Files Changed" >> $GITHUB_STEP_SUMMARY
          git diff --name-only origin/${{ github.event.pull_request.base.ref }}...${{ github.event.pull_request.head.sha }} >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Statistics" >> $GITHUB_STEP_SUMMARY
          echo "- Files changed: $(git diff --name-only origin/${{ github.event.pull_request.base.ref }}...${{ github.event.pull_request.head.sha }} | wc -l)" >> $GITHUB_STEP_SUMMARY
          echo "- Lines added: $(git diff --shortstat origin/${{ github.event.pull_request.base.ref }}...${{ github.event.pull_request.head.sha }} | awk '{print $4}')" >> $GITHUB_STEP_SUMMARY
          echo "- Lines deleted: $(git diff --shortstat origin/${{ github.event.pull_request.base.ref }}...${{ github.event.pull_request.head.sha }} | awk '{print $6}')" >> $GITHUB_STEP_SUMMARY

  pr-labeler:
    name: Auto Label PR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Label PR based on files
        uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

  final-check:
    name: PR Ready for Review
    runs-on: ubuntu-latest
    needs: [validate-pr, build-check, code-review]
    if: always()

    steps:
      - name: Check all jobs
        run: |
          if [ "${{ needs.validate-pr.result }}" != "success" ] || \
             [ "${{ needs.build-check.result }}" != "success" ]; then
            echo "❌ PR checks failed. Please fix the issues before requesting review."
            exit 1
          fi
          echo "✅ All PR checks passed! Ready for review."

      - name: Comment on PR
        uses: actions/github-script@v7
        if: success()
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ All automated checks passed! This PR is ready for review.'
            })
