name: Backend CD

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'

  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  deploy:
    name: Deploy Application
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment || 'staging' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build application
        run: ./gradlew clean bootJar

      - name: Extract version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            # For tags, extract version from tag name
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            # For regular commits, use gradle version or default
            VERSION=$(./gradlew properties -q | grep "^version:" | awk '{print $2}' | tr -d '\r\n' | xargs || echo "dev-${GITHUB_SHA::7}")
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Application version: ${VERSION}"

      - name: Create release artifact
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          mkdir -p release
          cp build/libs/*.jar release/
          cp docker-compose.yml release/
          cp .env.example release/
          tar -czf release-${{ steps.version.outputs.version }}.tar.gz release/

      - name: Upload release artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: release-artifact
          path: release-${{ steps.version.outputs.version }}.tar.gz

  docker-publish:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub (optional)
        # Uncomment and configure if pushing to Docker Hub
        # uses: docker/login-action@v3
        # with:
        #   username: ${{ secrets.DOCKER_USERNAME }}
        #   password: ${{ secrets.DOCKER_PASSWORD }}
        run: echo "Docker login skipped - configure secrets to enable"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: task-tracker-backend
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false  # Set to true when Docker Hub is configured
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo "Image pushed with digest ${{ steps.docker-build.outputs.digest }}"

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: deploy
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: release-artifact

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release-*.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notification:
    name: Deployment Notification
    runs-on: ubuntu-latest
    needs: [deploy, docker-publish]
    if: always()

    steps:
      - name: Deployment status
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ] && [ "${{ needs.docker-publish.result }}" == "success" ]; then
            echo "✅ Deployment successful!"
            echo "Environment: ${{ github.event.inputs.environment || 'staging' }}"
            echo "Version: ${{ needs.deploy.outputs.version }}"
          else
            echo "❌ Deployment failed!"
            exit 1
          fi

      # Optional: Send notification to Slack, Discord, etc.
      # - name: Send Slack notification
      #   uses: 8398a7/action-slack@v3
      #   with:
      #     status: ${{ job.status }}
      #     text: 'Deployment to ${{ github.event.inputs.environment || 'staging' }} completed'
      #     webhook_url: ${{ secrets.SLACK_WEBHOOK }}
      #   if: always()
