# Configuration for PR labeler (v5+ format)
# Automatically labels PRs based on changed files

documentation:
  - changed-files:
    - any-glob-to-any-file: '**/*.md'
    - any-glob-to-any-file: 'docs/**/*'

dependencies:
  - changed-files:
    - any-glob-to-any-file: 'build.gradle.kts'
    - any-glob-to-any-file: 'gradle/**/*'

configuration:
  - changed-files:
    - any-glob-to-any-file: '**/application*.properties'
    - any-glob-to-any-file: '**/application*.yml'
    - any-glob-to-any-file: '**/*.env*'

docker:
  - changed-files:
    - any-glob-to-any-file: 'Dockerfile'
    - any-glob-to-any-file: 'docker-compose.yml'
    - any-glob-to-any-file: '.dockerignore'

ci-cd:
  - changed-files:
    - any-glob-to-any-file: '.github/**/*'

api:
  - changed-files:
    - any-glob-to-any-file: 'src/**/controller/**/*'
    - any-glob-to-any-file: 'src/**/dto/**/*'

database:
  - changed-files:
    - any-glob-to-any-file: 'src/**/repository/**/*'
    - any-glob-to-any-file: 'src/**/domain/**/*'
    - any-glob-to-any-file: '**/migration/**/*'

security:
  - changed-files:
    - any-glob-to-any-file: 'src/**/config/SecurityConfig.kt'
    - any-glob-to-any-file: 'src/**/config/*Security*'

tests:
  - changed-files:
    - any-glob-to-any-file: 'src/test/**/*'
    - any-glob-to-any-file: '**/*Test.kt'
    - any-glob-to-any-file: '**/*Tests.kt'

bugfix:
  - head-branch: ['^fix', 'fix\\/']

feature:
  - head-branch: ['^feat', 'feature\\/']
