spring.application.name=task-tracker-backend

# Server configuration
server.port=8080

# H2 Database Configuration (in-memory for development)
#spring.h2.console.enabled=true
#spring.h2.console.path=/h2-console
#spring.datasource.url=jdbc:h2:mem:taskdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
#spring.datasource.driverClassName=org.h2.Driver
#spring.datasource.username=sa
#spring.datasource.password=

# Database Configuration - supports environment variables for Docker
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/tasktracker_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:user}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
#spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# should set spring.jpa.hibernate.ddl-auto=none and use a dedicated database migration tool like Flyway or Liquibase.
# This gives  much finer control over schema changes and allows for rollback strategies, which are critical for production environments.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Actuator Configuration (for Docker health checks)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when-authorized

# Logging
logging.level.org.springframework=INFO
logging.level.com.tasktracker=DEBUG
